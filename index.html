<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flex DS — Dark Matter Roadmap</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <header id="header">
      <div class="header-left">
        <div class="logo">Flex DS</div>
      </div>
      <div class="header-right">
        <div class="toolbar">
          <div class="filter-wrap">
            <button id="btn-filter" title="Filter items">Filter</button>
            <div id="filter-popover" class="hidden">
              <div class="filter-pop-head">
                <span>Filters</span>
                <button id="btn-clear-filters">Clear all</button>
              </div>
              <div class="filter-section"><span class="filter-label">Phase</span><div id="filter-phase" class="filter-group"></div></div>
              <div class="filter-section"><span class="filter-label">Status</span><div id="filter-status" class="filter-group"></div></div>
              <div class="filter-section"><span class="filter-label">Workstream</span><div id="filter-workstream" class="filter-group"></div></div>
            </div>
          </div>
          <button id="btn-manage" title="Manage people, workstreams, statuses, phases & key dates">⚙ Manage</button>
          <button id="btn-share" title="Share link">Share</button>
          <button id="btn-export" title="Export JSON">Export</button>
          <label id="btn-import-label" title="Import JSON">Import<input type="file" id="btn-import" accept=".json" /></label>
          <button id="btn-reset" title="Reset to bundled seed data">↺ Reset</button>
          <button id="btn-add" title="Add item">+ Add</button>
        </div>
      </div>
    </header>

    <div id="legend">
      <span class="legend-label">Status:</span>
      <span id="legend-swatches"></span>
    </div>

    <div id="timeline-wrap">
      <div id="timeline-outer">
        <div id="col-header">
          <div class="lane-label-spacer"></div>
          <div id="week-headers" class="week-headers"></div>
        </div>
        <div id="swimlanes"></div>
      </div>
    </div>
  </div>

  <!-- Edit side panel -->
  <div id="panel-overlay">
    <div id="panel">
      <h2 id="panel-title">Edit item</h2>
      <div class="form-grid">
        <label>Title<input id="f-title" type="text" /></label>
        <label>Owner<select id="f-owner"></select></label>
        <label>Workstream<select id="f-workstream"></select></label>
        <label>Phase<select id="f-phase"></select></label>
        <label>Status<select id="f-status"></select></label>
        <label>Start<input id="f-start" type="date" /></label>
        <label>End<input id="f-end" type="date" /></label>
        <label>Linear ticket (ID or URL)<input id="f-linear" type="text" placeholder="DS-179" /></label>
        <label>Notes<textarea id="f-notes" rows="3"></textarea></label>
      </div>
      <div class="modal-actions">
        <button id="panel-delete" class="btn-danger">Delete</button>
        <span style="flex:1"></span>
        <button id="panel-cancel">Cancel</button>
        <button id="panel-save" class="btn-primary">Save</button>
      </div>
    </div>
  </div>

  <!-- Settings / Manage modal -->
  <div id="settings-overlay" class="hidden">
    <div id="settings-modal">
      <h2>Manage lists</h2>
      <div id="settings-body">
        <section class="settings-section">
          <h3>Key dates</h3>
          <div class="keydates-grid">
            <label>Code complete<input id="s-cc-date" type="date" /></label>
            <label>Deployment<input id="s-deploy-date" type="date" /></label>
          </div>
        </section>
        <section class="settings-section">
          <h3>People <button class="add-row" data-list="people">+ Add</button></h3>
          <div id="list-people" class="settings-list"></div>
        </section>
        <section class="settings-section">
          <h3>Workstreams <button class="add-row" data-list="workstreams">+ Add</button></h3>
          <div id="list-workstreams" class="settings-list"></div>
        </section>
        <section class="settings-section">
          <h3>Statuses <button class="add-row" data-list="statuses">+ Add</button></h3>
          <div id="list-statuses" class="settings-list"></div>
        </section>
        <section class="settings-section">
          <h3>Phases <button class="add-row" data-list="phases">+ Add</button></h3>
          <div id="list-phases" class="settings-list"></div>
        </section>
      </div>
      <div class="modal-actions">
        <span style="flex:1"></span>
        <button id="settings-close" class="btn-primary">Done</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
